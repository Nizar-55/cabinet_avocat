{% extends "base.html" %}
{% load i18n %}
{% load crispy_forms_tags %}

{% block title %}{{ title }} - {{ block.super }}{% endblock %}

{% block content %}
<div class="container py-4">
    <h1 class="h2 mb-4">
        <i class="fas fa-user-plus"></i> {{ title }}
    </h1>

    <div class="card">
        <div class="card-body">
            <form method="post" novalidate>
                {% csrf_token %}
                {{ form|crispy }}
                <div class="mt-4">
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-save"></i> {% trans "Créer le compte" %}
                    </button>
                    <a href="{% url 'home' %}" class="btn btn-secondary">
                        <i class="fas fa-times"></i> {% trans "Annuler" %}
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
