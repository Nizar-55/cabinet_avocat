{% extends "base.html" %}
{% load crispy_forms_tags %}

{% block title %}Connexion - {{ block.super }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header">
                <h4 class="card-title mb-0">Connexion</h4>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    {{ form|crispy }}
                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary">Continuer</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
